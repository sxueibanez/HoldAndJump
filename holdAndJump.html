<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>精致版 3D 跳一跳</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            touch-action: none; /* 防止移动端滚动和缩放 */
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让点击穿透到 Canvas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            pointer-events: auto; /* 恢复点击 */
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .btn {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            transition: transform 0.1s, background 0.3s;
            outline: none;
        }

        .btn:active {
            transform: scale(0.95);
            background: #357ABD;
        }

        #score-display {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            font-weight: bold;
            color: rgba(50, 50, 50, 0.3);
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            z-index: 10;
        }

        /* 隐藏状态 */
        .hidden {
            opacity: 0;
            pointer-events: none !important;
            transform: scale(0.9);
            display: none; /* 延时后真正隐藏 */
        }

        /* 能量条 (仅作视觉反馈辅助) */
        #power-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: #4A90E2;
            border-radius: 3px;
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入 GSAP 用于平滑动画 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="score-display">0</div>

    <div id="power-indicator">
        <div id="power-bar"></div>
    </div>

    <div id="ui-layer">
        <!-- 开始面板 -->
        <div id="start-panel" class="panel">
            <h1>跳一跳</h1>
            <p>长按屏幕蓄力，松开跳跃</p>
            <button class="btn" id="start-btn">开始游戏</button>
        </div>

        <!-- 结束面板 -->
        <div id="game-over-panel" class="panel hidden">
            <h1>游戏结束</h1>
            <p style="font-size: 24px; color:#333; font-weight: bold;">得分: <span id="final-score">0</span></p>
            <button class="btn" id="restart-btn">再来一局</button>
        </div>
    </div>

    <script>
        // --- 核心游戏配置 ---
        const CONFIG = {
            blockWidth: 3.5,     // 方块基础宽度
            blockHeight: 2.5,    // 方块基础高度
            jumperWidth: 0.8,    // 棋子底座宽度
            maxDistance: 12,     // 方块最大距离
            minDistance: 4,      // 方块最小距离
            chargeSpeed: 0.001,  // 蓄力速度 (已调慢，原为 0.003，现在1.5秒蓄满)
            maxPower: 1.5,       // 最大蓄力值
            colors: [            // 精致柔和的马卡龙色系
                0xffb6b9, 0xfae3d9, 0xbbded6, 0x8ac6d1, 
                0xffd3b6, 0xdca3a3, 0xa8e6cf, 0xdcedc1
            ]
        };

        // --- 游戏状态 ---
        let state = {
            status: 'init', // init, ready, charging, jumping, gameover
            score: 0,
            power: 0,
            direction: 'x', // 下一个方块的方向：'x' 或 'z'
            currentBlock: null,
            nextBlock: null,
            blocks: []
        };

        // --- Three.js 变量 ---
        let scene, camera, renderer;
        let cameraRig; // 用于平滑移动相机的包裹体
        let jumperGroup, jumperBody, jumperHead;
        let dirLight;

        // UI 元素
        const startPanel = document.getElementById('start-panel');
        const gameOverPanel = document.getElementById('game-over-panel');
        const scoreDisplay = document.getElementById('score-display');
        const finalScore = document.getElementById('final-score');
        const powerIndicator = document.getElementById('power-indicator');
        const powerBar = document.getElementById('power-bar');

        init();

        function init() {
            // 1. 初始化场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e6ed);
            scene.fog = new THREE.Fog(0xe0e6ed, 80, 150); // 修复：调整雾效距离，防止场景被完全遮挡

            // 2. 初始化相机 (正交相机，产生经典 2.5D 等距视角)
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 16;
            camera = new THREE.OrthographicCamera(
                frustumSize * aspect / -2, 
                frustumSize * aspect / 2, 
                frustumSize / 2, 
                frustumSize / -2, 
                -100, 1000
            );

            // 使用 CameraRig 方便整体平移视角
            cameraRig = new THREE.Group();
            cameraRig.add(camera);
            scene.add(cameraRig);
            
            camera.position.set(50, 50, 50); // 修复：将相机移近，配合雾效距离
            camera.lookAt(0, 0, 0);

            // 3. 初始化渲染器
            const canvas = document.getElementById('game-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true; // 开启阴影
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和阴影

            // 4. 灯光设置 (精致的光影)
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0xc0c0c0, 0.6);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(20, 50, 30);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);
            scene.add(dirLight.target); // 修复：将灯光目标加入场景，确保阴影跟随更新

            // 添加一个大平面接收背景阴影
            const planeGeo = new THREE.PlaneGeometry(1000, 1000);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.1 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -CONFIG.blockHeight / 2 - 0.1;
            plane.receiveShadow = true;
            scene.add(plane);

            // 5. 事件监听
            window.addEventListener('resize', onWindowResize);
            
            // 绑定交互事件
            document.body.addEventListener('mousedown', handlePointerDown);
            document.body.addEventListener('touchstart', handlePointerDown, {passive: false});
            document.body.addEventListener('mouseup', handlePointerUp);
            document.body.addEventListener('touchend', handlePointerUp);

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

            // 创建初始棋子但先隐藏
            createJumper();

            // 修复：页面加载完毕立刻渲染初始场景，避免初始白屏
            resetGameScene();

            // 6. 开始渲染循环
            renderer.setAnimationLoop(animate);
        }

        // 创建玩家棋子 (圆柱体 + 球体)
        function createJumper() {
            jumperGroup = new THREE.Group();
            
            // 材质：深色，带有一点金属质感
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x3b3a42,
                roughness: 0.6,
                metalness: 0.3
            });

            // 身体
            const bodyGeo = new THREE.CylinderGeometry(CONFIG.jumperWidth * 0.7, CONFIG.jumperWidth, 1.8, 32);
            jumperBody = new THREE.Mesh(bodyGeo, material);
            jumperBody.position.y = 0.9; // 抬起以便底部对齐原点
            jumperBody.castShadow = true;

            // 头部
            const headGeo = new THREE.SphereGeometry(CONFIG.jumperWidth * 0.75, 32, 32);
            jumperHead = new THREE.Mesh(headGeo, material);
            jumperHead.position.y = 2.2;
            jumperHead.castShadow = true;

            jumperGroup.add(jumperBody);
            jumperGroup.add(jumperHead);
            
            scene.add(jumperGroup);
            jumperGroup.visible = false;
        }

        // 生成随机颜色的材质
        function getRandomMaterial() {
            const color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
            return new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.8,
                metalness: 0.1
            });
        }

        // 添加一个方块
        function addBlock(isFirst = false) {
            // 随机大小，第一块固定大小
            const width = isFirst ? CONFIG.blockWidth : CONFIG.blockWidth * (0.7 + Math.random() * 0.6);
            
            let geometry;
            // 随机生成方块或圆柱
            if (Math.random() > 0.5) {
                geometry = new THREE.BoxGeometry(width, CONFIG.blockHeight, width);
            } else {
                geometry = new THREE.CylinderGeometry(width/2, width/2, CONFIG.blockHeight, 32);
            }

            const material = getRandomMaterial();
            const block = new THREE.Mesh(geometry, material);
            block.castShadow = true;
            block.receiveShadow = true;
            block.gameWidth = width; // 存储有效判定宽度

            if (isFirst) {
                block.position.set(0, 0, 0);
            } else {
                // 确定位置：基于上一个方块
                const lastBlock = state.blocks[state.blocks.length - 1];
                
                // 随机距离
                const distance = CONFIG.minDistance + Math.random() * (CONFIG.maxDistance - CONFIG.minDistance);
                
                // 随机方向 (X 轴或 Z 轴负方向，以符合等距视角向前移动的感觉)
                state.direction = Math.random() > 0.5 ? 'x' : 'z';

                block.position.copy(lastBlock.position);
                if (state.direction === 'x') {
                    block.position.x += distance;
                } else {
                    block.position.z -= distance;
                }
            }

            // 出场动画：从下往上弹出
            block.position.y = -10;
            gsap.to(block.position, {
                y: 0,
                duration: 0.6,
                ease: "back.out(1.5)"
            });

            scene.add(block);
            state.blocks.push(block);
            
            // 保持内存中只有少量方块
            if (state.blocks.length > 8) {
                const oldBlock = state.blocks.shift();
                scene.remove(oldBlock);
                oldBlock.geometry.dispose();
                oldBlock.material.dispose();
            }

            return block;
        }

        // 抽取独立方法：初始化/重置游戏场景
        function resetGameScene() {
            // 清理旧场景
            state.blocks.forEach(block => {
                scene.remove(block);
                block.geometry.dispose();
                block.material.dispose();
            });
            state.blocks = [];
            
            // 重置状态
            state.score = 0;
            state.power = 0;
            scoreDisplay.innerText = '0';
            cameraRig.position.set(0, 0, 0);

            // 生成初始的两个方块
            state.currentBlock = addBlock(true);
            setTimeout(() => {
                state.nextBlock = addBlock(false);
                updateCameraRig(true);
            }, 300);

            // 重置棋子
            jumperGroup.position.set(0, CONFIG.blockHeight / 2, 0);
            jumperGroup.rotation.set(0, 0, 0);
            jumperGroup.scale.set(1, 1, 1);
            jumperGroup.visible = true;
        }

        // 开始游戏逻辑
        function startGame() {
            if (state.status === 'gameover') {
                resetGameScene();
            }
            
            state.status = 'ready';
            
            // UI 切换
            hideUI(startPanel);
            hideUI(gameOverPanel);
        }

        // --- 交互逻辑 ---

        let chargeRAF;
        let lastTime = 0;

        function handlePointerDown(e) {
            // 如果点在 UI 面板上，不触发蓄力
            if (e.target.closest('.panel') && state.status !== 'ready') return;
            if (state.status !== 'ready') return;
            
            e.preventDefault();
            state.status = 'charging';
            state.power = 0;
            lastTime = performance.now();
            powerIndicator.style.opacity = '1';

            // 开始蓄力循环
            chargeRAF = requestAnimationFrame(chargeLoop);

            // 精致动画：棋子向下压扁
            gsap.to(jumperGroup.scale, {
                y: 0.5,
                x: 1.3,
                z: 1.3,
                duration: 1.5, // 假设蓄满需要 1.5 秒
                ease: "power1.out"
            });
            
            // 稍微放大一下头部，显得更可爱
            gsap.to(jumperHead.position, {
                y: 1.8,
                duration: 1.5
            });
        }

        function handlePointerUp(e) {
            if (state.status !== 'charging') return;
            e.preventDefault();
            
            cancelAnimationFrame(chargeRAF);
            powerIndicator.style.opacity = '0';
            
            jump();
        }

        // 蓄力循环
        function chargeLoop(time) {
            if (state.status !== 'charging') return;
            
            const delta = time - lastTime;
            lastTime = time;
            
            state.power += CONFIG.chargeSpeed * delta;
            if (state.power > CONFIG.maxPower) {
                state.power = CONFIG.maxPower;
            }

            powerBar.style.width = `${(state.power / CONFIG.maxPower) * 100}%`;
            
            chargeRAF = requestAnimationFrame(chargeLoop);
        }

        // 跳跃逻辑
        function jump() {
            state.status = 'jumping';

            // 1. 恢复形状动画
            gsap.killTweensOf(jumperGroup.scale);
            gsap.killTweensOf(jumperHead.position);
            gsap.to(jumperGroup.scale, { y: 1, x: 1, z: 1, duration: 0.3, ease: "back.out(2)" });
            gsap.to(jumperHead.position, { y: 2.2, duration: 0.3, ease: "back.out(2)" });

            // 2. 计算目标位置
            // 跳跃距离与蓄力值成正比
            const jumpDistance = state.power * 15; // 比例系数
            const targetPos = jumperGroup.position.clone();
            
            if (state.direction === 'x') {
                targetPos.x += jumpDistance;
            } else {
                targetPos.z -= jumpDistance;
            }

            // 3. 执行跳跃动画 (使用抛物线/分轴动画)
            const jumpDuration = 0.5 + (state.power * 0.3); // 距离越远，时间稍长

            // 水平移动
            gsap.to(jumperGroup.position, {
                x: targetPos.x,
                z: targetPos.z,
                duration: jumpDuration,
                ease: "power1.inOut" // 或者 "linear" 配合抛物线更好
            });

            // 垂直跳跃 (抛物线效果)
            const jumpHeight = 3 + state.power * 2;
            gsap.to(jumperGroup.position, {
                y: jumperGroup.position.y + jumpHeight,
                duration: jumpDuration / 2,
                yoyo: true, // 上去后再下来
                repeat: 1,
                ease: "power2.out",
                onComplete: checkCollision // 落地时检查碰撞
            });

            // 翻滚动画 (稍微旋转一下身体增加动感)
            const axis = state.direction === 'x' ? 'z' : 'x';
            const angle = state.direction === 'x' ? -Math.PI * 2 : Math.PI * 2;
            gsap.to(jumperGroup.rotation, {
                [axis]: angle,
                duration: jumpDuration,
                ease: "power1.inOut",
                onComplete: () => {
                    jumperGroup.rotation.set(0,0,0); // 重置角度防累计误差
                }
            });
            
            // 重置 power 表现
            setTimeout(() => { powerBar.style.width = '0%'; }, 200);
        }

        // 碰撞检测
        function checkCollision() {
            // 获取棋子 2D 位置 (x, z)
            const pX = jumperGroup.position.x;
            const pZ = jumperGroup.position.z;
            
            // 获取目标方块中心及宽度
            const tX = state.nextBlock.position.x;
            const tZ = state.nextBlock.position.z;
            const tW = state.nextBlock.gameWidth;
            
            // 获取当前方块中心 (用于判断是否原地跳)
            const cX = state.currentBlock.position.x;
            const cZ = state.currentBlock.position.z;
            const cW = state.currentBlock.gameWidth;

            // 判断距离
            const distToNext = Math.hypot(pX - tX, pZ - tZ);
            const distToCurrent = Math.hypot(pX - cX, pZ - cZ);

            if (distToNext < tW / 2) {
                // 成功跳到下一个方块
                handleSuccess(distToNext, tW);
            } else if (distToCurrent < cW / 2) {
                // 原地跳回当前方块，安全
                state.status = 'ready';
                // 微调位置到当前中心
                gsap.to(jumperGroup.position, {x: cX, z: cZ, duration: 0.1});
            } else {
                // 失败掉落
                handleFail(pX, pZ, tX, tZ, cX, cZ);
            }
        }

        // 成功处理
        function handleSuccess(distance, blockWidth) {
            // 中心点得分加成判定：距离中心极近加 2 分，否则加 1 分
            const isPerfect = distance < blockWidth / 6;
            state.score += isPerfect ? 2 : 1;
            scoreDisplay.innerText = state.score;

            // 如果完美跳跃，可以加一个精致的光圈特效 (这里简化为棋子轻微弹跳)
            if (isPerfect) {
                createRipple(state.nextBlock);
            }

            // 微调位置贴合中心点
            gsap.to(jumperGroup.position, {
                x: state.nextBlock.position.x, 
                z: state.nextBlock.position.z, 
                duration: 0.1
            });

            // 更新状态
            state.currentBlock = state.nextBlock;
            state.nextBlock = addBlock(false); // 生成新方块
            
            updateCameraRig(); // 移动相机
            
            state.status = 'ready';
        }

        // 创建成功波纹特效
        function createRipple(block) {
            const rippleGeo = new THREE.RingGeometry(0.1, 0.5, 32);
            const rippleMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });
            const ripple = new THREE.Mesh(rippleGeo, rippleMat);
            ripple.rotation.x = -Math.PI / 2;
            ripple.position.copy(block.position);
            ripple.position.y = CONFIG.blockHeight / 2 + 0.05;
            scene.add(ripple);

            gsap.to(ripple.scale, {x: block.gameWidth, y: block.gameWidth, duration: 0.6, ease: "power2.out"});
            gsap.to(rippleMat, {opacity: 0, duration: 0.6, onComplete: () => {
                scene.remove(ripple);
                ripple.geometry.dispose();
                rippleMat.dispose();
            }});
        }

        // 失败处理
        function handleFail(px, pz, tx, tz, cx, cz) {
            state.status = 'gameover';
            
            // 简单的跌落动画
            gsap.to(jumperGroup.position, {
                y: -10,
                duration: 0.6,
                ease: "power1.in"
            });

            // 稍微往外倾斜
            const fallRotX = (pz < tz || pz < cz) ? 0.5 : -0.5;
            const fallRotZ = (px > tx || px > cx) ? -0.5 : 0.5;
            
            gsap.to(jumperGroup.rotation, {
                x: jumperGroup.rotation.x + fallRotX,
                z: jumperGroup.rotation.z + fallRotZ,
                duration: 0.6
            });

            // 延迟显示结束界面
            setTimeout(() => {
                finalScore.innerText = state.score;
                showUI(gameOverPanel);
            }, 800);
        }

        // 平滑移动相机系统，跟随方块
        function updateCameraRig(instant = false) {
            // 计算当前方块和下一方块的中心点
            const targetX = (state.currentBlock.position.x + state.nextBlock.position.x) / 2;
            const targetZ = (state.currentBlock.position.z + state.nextBlock.position.z) / 2;
            
            if (instant) {
                cameraRig.position.set(targetX, 0, targetZ);
            } else {
                gsap.to(cameraRig.position, {
                    x: targetX,
                    z: targetZ,
                    duration: 0.8,
                    ease: "power2.out"
                });
            }
        }

        // 渲染循环
        function animate() {
            // 使灯光跟随相机移动以保持阴影稳定
            if (dirLight && cameraRig) {
                dirLight.position.x = cameraRig.position.x + 20;
                dirLight.position.z = cameraRig.position.z + 30;
                dirLight.target.position.set(cameraRig.position.x, 0, cameraRig.position.z);
                dirLight.target.updateMatrixWorld();
            }

            renderer.render(scene, camera);
        }

        // 响应窗口尺寸变化
        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 16;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // UI 辅助控制
        function showUI(element) {
            element.style.display = 'block';
            // 触发重绘
            void element.offsetWidth; 
            element.classList.remove('hidden');
        }

        function hideUI(element) {
            element.classList.add('hidden');
            setTimeout(() => {
                if(element.classList.contains('hidden')) {
                    element.style.display = 'none';
                }
            }, 300); // 对应 css transition 时间
        }

    </script>
</body>
</html>
